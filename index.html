<body>
  <div id="boot-splash" role="button" tabindex="0" aria-label="Press any key to boot">
    <p class="boot-msg">Press <a href="https://www.youtube.com/watch?v=st6-DgWeuos" id="any-key-link" target="_blank" rel="noopener">[any&nbsp;key]</a> to boot.</p>
  </div>
  <div class="crt">
    <div class="scanlines" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>
    <main id="terminal" class="terminal" aria-label="Interactive terminal">
      <div id="output" class="output" aria-live="polite"></div>
      <form id="prompt-form" class="prompt-line" autocomplete="off">
        <span class="prompt" id="prompt-prefix">guest@trent-buckley:~$&nbsp;</span>
        <span class="input-wrap">
          <input
            id="cmd"
            class="cmd"
            type="text"
            spellcheck="false"
            autocapitalize="off"
            autocorrect="off"
            inputmode="text"
            aria-label="Terminal input"
          />
          <span class="caret" aria-hidden="true"></span>
        </span>
      </form>
    </main>
  </div>
  <script src="./games.js" defer></script>
  <script src="./script.js" defer></script>
</body>
